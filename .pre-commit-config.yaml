default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
        exclude: ^results\.json$
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/.*\.py$
        args:
          - --config=backend/pyproject.toml

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^backend/.*\.py$
        args:
          - --settings-path=backend/pyproject.toml

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        files: ^backend/.*\.py$
        args:
          - --toml-config=backend/pyproject.toml
        additional_dependencies:
          - flake8-pyproject==1.2.3

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (backend)
        # This is the hook virtualenv's Python, not the project interpreter.
        entry: python -m mypy
        args:
          - --config-file=backend/pyproject.toml
          - backend
        files: ^backend/.*\.py$
        pass_filenames: false
        additional_dependencies:
          - mypy==1.13.0

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: eslint (frontend)
        files: ^frontend/.*\.(js|mjs|ts|tsx)$
        exclude: ^frontend/(node_modules|\.next)/|^frontend/next-env\.d\.ts$
        args:
          - --config
          - frontend/.eslintrc.json
          - --max-warnings=0
        additional_dependencies:
          - eslint@8.57.1
          - eslint-config-next@15.5.19
          - typescript@5.9.3

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier (frontend)
        files: ^frontend/.*\.(css|js|json|mjs|ts|tsx)$
        exclude: ^frontend/(node_modules|\.next)/|^frontend/(package-lock\.json|next-env\.d\.ts)$
        args:
          - --config
          - frontend/.prettierrc
          - --write
